<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dzongkhag Map of Bhutan</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link href="https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Hindi&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #f0ebe3;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* TOPBAR */
    #topbar {
      background: #1a1a2e;
      padding: 0 20px;
      height: 52px;
      display: flex;
      align-items: center;
      gap: 14px;
      z-index: 1000;
      flex-shrink: 0;
      border-bottom: 2px solid #e8a020;
    }
    .logo {
      font-family: 'Tiro Devanagari Hindi', serif;
      font-size: 18px;
      color: #e8a020;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logo-sub { color: rgba(255,255,255,.5); font-family:'DM Sans',sans-serif; font-size:12px; font-weight:400; }
    #search-box {
      flex:1; max-width:360px;
      background: rgba(255,255,255,.09);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 20px;
      padding: 7px 16px;
      font-size: 13px; color: #fff;
      outline: none;
      transition: background .2s, border-color .2s;
    }
    #search-box::placeholder { color: rgba(255,255,255,.35); }
    #search-box:focus { background: rgba(255,255,255,.15); border-color: #e8a020; }

    #layer-btn {
      background: rgba(255,255,255,.09);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 8px;
      padding: 6px 13px;
      font-size: 12px; color: #ccc;
      cursor: pointer;
      display: flex; align-items: center; gap: 6px;
    }
    #layer-btn:hover { background: rgba(232,160,32,.18); border-color:#e8a020; color:#e8a020; }

    /* MAIN */
    #main { flex:1; display:flex; overflow:hidden; position:relative; }

    /* SIDE PANEL */
    #side-panel {
      position: absolute;
      top: 0; left: 0; bottom: 0;
      width: 50px;
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      z-index: 500;
      transition: width .32s cubic-bezier(.4,0,.2,1);
      overflow: hidden;
      box-shadow: 3px 0 18px rgba(0,0,0,.28);
    }
    #side-panel.open { width: 268px; }

    #panel-toggle {
      width: 50px;
      min-height: 50px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      border-bottom: 1px solid rgba(232,160,32,.22);
      color: #e8a020;
      transition: background .2s;
    }
    #panel-toggle:hover { background: rgba(232,160,32,.1); }
    #panel-toggle svg { transition: transform .32s; }
    #side-panel.open #panel-toggle svg { transform: rotate(180deg); }

    #panel-content {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s .14s;
      min-width: 268px;
    }
    #side-panel.open #panel-content { opacity: 1; pointer-events: auto; }

    .panel-header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid rgba(232,160,32,.18);
    }
    .panel-header h2 {
      font-family: 'Tiro Devanagari Hindi', serif;
      font-size: 14px;
      color: #e8a020;
      margin-bottom: 4px;
    }
    .panel-header p { font-size: 11.5px; color: rgba(255,255,255,.4); line-height: 1.55; }

    .dzong-label {
      padding: 10px 16px 4px;
      font-size: 9.5px;
      text-transform: uppercase;
      letter-spacing: 1.1px;
      color: rgba(255,255,255,.28);
      font-weight: 600;
    }

    .dzong-chip {
      display: flex; align-items: center; gap: 10px;
      padding: 7px 16px;
      cursor: pointer;
      transition: background .14s;
      border-left: 3px solid transparent;
      white-space: nowrap;
    }
    .dzong-chip:hover { background: rgba(255,255,255,.05); border-left-color: #e8a020; }
    .dzong-chip.active { background: rgba(232,160,32,.1); border-left-color: #e8a020; }
    .dzong-chip .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      box-shadow: 0 0 0 1.5px rgba(255,255,255,.12);
    }
    .dzong-chip span { font-size: 13px; color: rgba(255,255,255,.78); }

    /* collapsed hint dots */
    #collapsed-hint {
      display: flex; flex-direction: column;
      align-items: center;
      padding: 10px 0;
      gap: 5px;
    }
    #side-panel.open #collapsed-hint { display: none; }
    .hint-dot { width: 6px; height: 6px; border-radius: 50%; opacity: .55; }

    /* MAP */
    #map-wrapper { flex:1; position:relative; }
    #map { width:100%; height:100%; }

    /* POPUP */
    .leaflet-popup-content-wrapper {
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,.22);
      padding: 0; overflow: hidden; border: none;
    }
    .leaflet-popup-content { margin: 0; width: 265px !important; }

    .pu-header {
      padding: 12px 15px 9px;
      color: #fff;
    }
    .pu-header h3 {
      font-family: 'Tiro Devanagari Hindi', serif;
      font-size: 15px;
      margin-bottom: 2px;
    }
    .pu-sub {
      font-size: 10px;
      opacity: .7;
      text-transform: uppercase;
      letter-spacing: .7px;
    }
    .pu-body {
      background: #fff;
      padding: 11px 15px 13px;
    }
    .pu-tags {
      display: flex; flex-wrap: wrap; gap: 4px;
      margin-bottom: 8px;
    }
    .pu-tag {
      font-size: 10px;
      background: #f5f0e8;
      color: #7a5520;
      border-radius: 20px;
      padding: 2px 8px;
      font-weight: 500;
    }
    .pu-desc {
      font-size: 12.5px;
      color: #444;
      line-height: 1.65;
      margin-bottom: 11px;
    }
    .pu-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: #1a1a2e;
      color: #e8a020;
      text-decoration: none;
      font-size: 12px;
      font-weight: 600;
      padding: 6px 13px;
      border-radius: 6px;
      transition: background .18s;
    }
    .pu-link:hover { background: #2c2c50; }

    /* LAYER MENU */
    #layer-menu {
      display: none;
      position: absolute; top: 10px; right: 14px;
      background: #1a1a2e;
      border-radius: 10px;
      box-shadow: 0 6px 24px rgba(0,0,0,.35);
      z-index: 2000;
      overflow: hidden; min-width: 200px;
      border: 1px solid rgba(232,160,32,.3);
    }
    #layer-menu.open { display: block; }
    .layer-option {
      padding: 10px 18px; font-size: 13px; color: #ccc;
      cursor: pointer; display: flex; align-items: center; gap: 10px;
    }
    .layer-option:hover { background: rgba(232,160,32,.14); color: #e8a020; }
    .layer-option.active { color: #e8a020; font-weight: 500; }
    .layer-option .swatch {
      width: 15px; height: 15px; border-radius: 3px;
      border: 1px solid rgba(255,255,255,.18); flex-shrink: 0;
    }

    /* LOADING */
    #loading {
      position: absolute; inset: 0;
      background: rgba(240,235,227,.88);
      display: flex; align-items: center; justify-content: center;
      z-index: 800; font-size: 13px; color: #666; gap: 10px;
      pointer-events: none;
    }
    #loading svg { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .leaflet-control-attribution { font-size: 10px !important; background: rgba(255,255,255,.7) !important; }

    #panel-content::-webkit-scrollbar { width: 3px; }
    #panel-content::-webkit-scrollbar-track { background: transparent; }
    #panel-content::-webkit-scrollbar-thumb { background: rgba(232,160,32,.28); border-radius: 2px; }

    /* BREADCRUMB */
    #breadcrumb {
      background: #13132a;
      padding: 5px 20px;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
      border-bottom: 1px solid rgba(232,160,32,.15);
    }
    .bc-item {
      font-size: 11.5px;
      color: rgba(255,255,255,.42);
      text-decoration: none;
      transition: color .15s;
    }
    .bc-item:hover { color: #e8a020; }
    .bc-sep { color: rgba(255,255,255,.2); font-size: 11px; }
    .bc-current { font-size: 11.5px; color: #e8a020; font-weight: 500; }
  </style>
</head>
<body>

<div id="topbar">
  <div class="logo">
    འབྲུག་རྒྱལ་ཁབ་
    <span class="logo-sub">Dzongkhag Explorer</span>
  </div>
  <input id="search-box" type="text" placeholder="Search a dzongkhag…" />
  <button id="layer-btn" onclick="toggleLayerMenu()">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
      <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
      <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
    </svg>
    Layers
  </button>
</div>
<nav id="breadcrumb">
  <a class="bc-item" href="index.html">Home</a>
  <span class="bc-sep">›</span>
  <span class="bc-current">Interactive Map</span>
</nav>

<div id="main">

  <div id="side-panel">
    <div id="panel-toggle" onclick="togglePanel()" title="Toggle dzongkhag list">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </div>
    <div id="collapsed-hint"></div>
    <div id="panel-content">
      <div class="panel-header">
        <h2>Kingdom of Bhutan</h2>
        <p>20 Dzongkhags &middot; Land of the Thunder Dragon.<br>Click a district to explore its highland heritage.</p>
      </div>
      <div class="dzong-label">All Dzongkhags</div>
      <div id="dzong-list"></div>
    </div>
  </div>

  <div id="map-wrapper">
    <div id="loading">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#e8a020" stroke-width="2.5">
        <circle cx="12" cy="12" r="10" stroke-opacity=".25"/>
        <path d="M12 2a10 10 0 0 1 10 10"/>
      </svg>
      Loading boundary…
    </div>
    <div id="map"></div>
    <div id="layer-menu">
      <div class="layer-option active" onclick="switchLayer('google')" data-id="google">
        <div class="swatch" style="background:#e8f5e9;"></div> Standard
      </div>
      <div class="layer-option" onclick="switchLayer('satellite')" data-id="satellite">
        <div class="swatch" style="background:#3a3a5a;"></div> Satellite
      </div>
      <div class="layer-option" onclick="switchLayer('topo')" data-id="topo">
        <div class="swatch" style="background:#f5f0e8;"></div> Topographic
      </div>
      <div class="layer-option" onclick="switchLayer('osm')" data-id="osm">
        <div class="swatch" style="background:#b5d0d0;"></div> OpenStreetMap
      </div>
    </div>
  </div>

</div>

<script>
function loadScript(src, cb) {
  const s = document.createElement('script');
  s.src = src; s.onload = cb;
  s.onerror = () => { document.getElementById('loading').textContent = 'Map library failed to load.'; };
  document.head.appendChild(s);
}

/* ═══════════════════════════════════════════════════
   20 DZONGKHAGS — heritage content + link placeholders
   Replace the `link` value with your actual HTML file paths
   ═══════════════════════════════════════════════════ */
const dzongkhags = [
  {
    name:'Thimphu', dzongkhag:'Thimphu Dzongkhag',
    lat:27.4728, lng:89.6393, color:'#1a73e8',
    tags:['Capital','Royal Dzong','State Religion'],
    desc:'Seat of the Dragon Throne and the Je Khenpo. Tashichho Dzong — the Fortress of the Glorious Religion — houses the sacred throne room and the Central Monk Body. The Changangkha Lhakhang, perched above the valley, predates the dzong by four centuries.',
    link:'thimphu.html'
  },
  {
    name:'Paro', dzongkhag:'Paro Dzongkhag',
    lat:27.4287, lng:89.4164, color:'#c0392b',
    tags:["Tiger's Nest",'Guru Rinpoche','Sacred Cliff'],
    desc:'Taktsang Palphug — the Tiger\'s Nest — clings to a 900 m granite cliff where Guru Rinpoche is said to have flown on a tigress and meditated in the 8th century. Rinpung Dzong below guards Paro valley with painted murals stretching across a century of devotion.',
    link:'paro.html'
  },
  {
    name:'Punakha', dzongkhag:'Punakha Dzongkhag',
    lat:27.5917, lng:89.8756, color:'#d4a017',
    tags:['Palace of Happiness','River Confluence','Winter Capital'],
    desc:'Punakha Dzong — Pungthang Dechen Phodrang — stands where the Mo Chhu and Pho Chhu rivers merge. Built by Zhabdrung Ngawang Namgyal in 1637, it enshrines his sacred robe and the relies of Bhutan\'s unifier. Jacaranda trees bloom violet on its courtyards each spring.',
    link:'punakha.html'
  },
  {
    name:'Bumthang', dzongkhag:'Bumthang Dzongkhag',
    lat:27.5495, lng:90.7268, color:'#27ae60',
    tags:['Spiritual Heartland','7th Century Temples','Terton Heritage'],
    desc:'Bhutan\'s spiritual nucleus encompasses four sacred valleys. Jambay Lhakhang (7th century) and Kurje Lhakhang — where Guru Rinpoche\'s body impression remains in stone — draw pilgrims year-round. Bumthang is also home to the Nyingma terton (treasure revealer) tradition.',
    link:'bumthang.html'
  },
  {
    name:'Haa', dzongkhag:'Haa Dzongkhag',
    lat:27.3920, lng:89.2789, color:'#8e44ad',
    tags:['Lhakhang Nagpo','Hidden Valley','Tibet Border'],
    desc:'Lhakhang Nagpo (Black Temple) and Lhakhang Karpo (White Temple) are said to have been built in a single night by the Tibetan king Songtsen Gampo in the 7th century to pin down a supine demoness. Haa valley remained closed to foreigners until 2002.',
    link:'haa-resourea.html'
  },
  {
    name:'Gasa', dzongkhag:'Gasa Dzongkhag',
    lat:27.9050, lng:89.7200, color:'#16a085',
    tags:['High Altitude','Sacred Hot Springs','Snowman Trek'],
    desc:'Bhutan\'s northernmost district shelters the Laya and Lunana highland communities at altitudes above 4,000 m. Gasa Tshachu\'s sacred hot springs are believed to cure ailments. The Snowman Trek — one of the world\'s most demanding — traverses glaciers and passes above 5,300 m.',
    link:'gasa.html'
  },
  {
    name:'Trongsa', dzongkhag:'Trongsa Dzongkhag',
    lat:27.5000, lng:90.5083, color:'#e74c3c',
    tags:['Royal Dynasty','Central Bhutan','Tower Museum'],
    desc:'Whoever controlled Trongsa Dzong controlled all passage between eastern and western Bhutan. The Wangchuck dynasty rose to power here in the 19th century. The Ta Dzong watchtower, converted into the Tower of Trongsa Royal Museum, narrates the origins of the monarchy.',
    link:'trongsa.html'
  },
  {
    name:'Wangdue Phodrang', dzongkhag:'Wangdue Phodrang Dzongkhag',
    lat:27.4853, lng:89.9003, color:'#795548',
    tags:['Black-Necked Crane','Phobjikha Valley','Dzong Gorge'],
    desc:'Phobjikha valley is the winter sanctuary of the endangered Black-Necked Crane, venerated as a sacred messenger of the deity Mahakala. Wangdue Phodrang Dzong — dramatically rebuilt after the 2012 fire — stands above the deep gorge of the Puna Tsang Chhu.',
    link:'wangdue.html'
  },
  {
    name:'Trashigang', dzongkhag:'Trashigang Dzongkhag',
    lat:27.3330, lng:91.5550, color:'#2980b9',
    tags:['Eastern Capital','Sharchop Culture','Kishuthara Silk'],
    desc:'Cultural capital of eastern Bhutan and home of the Sharchop people. Trashigang Dzong sits on a promontory above the Drangme Chhu. The region preserves Bhutan\'s finest raw silk kishuthara weaving — intricate geometric patterns passed through generations of weavers.',
    link:'trashigang.html'
  },
  {
    name:'Pemagatshel', dzongkhag:'Pemagatshel Dzongkhag',
    lat:27.0400, lng:91.3600, color:'#e67e22',
    tags:['Beyul','Sacred Lotus Grove','Eastern Hills'],
    desc:'Named "the lotus grove of bliss," Pemagatshel\'s Khenpalung valley is one of Bhutan\'s beyul — hidden sacred lands identified in Nyingma Buddhist scripture as refuges for devotees in times of great upheaval. The valley remains largely untouched and spiritually charged.',
    link:'pemagatshel.html'
  },
  {
    name:'Mongar', dzongkhag:'Mongar Dzongkhag',
    lat:27.2740, lng:91.2400, color:'#e91e8c',
    tags:['Kheng Heritage','Trade Crossroads','Terrace Villages'],
    desc:'Heart of the Kheng people, whose distinct dialect, cane-and-bamboo weaving craft, and animist-Buddhist blended festival traditions are among the least-studied in Bhutan. Mongar Dzong gleams on a ridge where ancient east-west trade routes once crossed.',
    link:'mongar.html'
  },
  {
    name:'Lhuentse', dzongkhag:'Lhuentse Dzongkhag',
    lat:27.6600, lng:90.8400, color:'#5c6bc0',
    tags:['Royal Ancestral Valley','Kuri Chhu Gorge','Finest Silk'],
    desc:'Ancestral seat of Bhutan\'s royal Wangchuck family. Lhuentse Dzong rises dramatically above the sheer walls of the Kuri Chhu gorge. The valley produces kishuthara considered the finest in Bhutan — woven on backstrap looms in patterns unique to this isolated highland.',
    link:'lhuentse.html'
  },
  {
    name:'Trashiyangtse', dzongkhag:'Trashiyangtse Dzongkhag',
    lat:27.6100, lng:91.5000, color:'#26a69a',
    tags:['Chorten Kora','Pilgrimage','Wooden Dapa Bowls'],
    desc:'Chorten Kora — a stupa modeled on Nepal\'s Boudhanath — is circumambulated during a three-week festival drawing pilgrims from across eastern Bhutan and Arunachal Pradesh. The district is also famed for hand-turned dapa wooden bowls, a dying craft passed down through master turners.',
    link:'trashiyangtse.html'
  },
  {
    name:'Samdrup Jongkhar', dzongkhag:'Samdrup Jongkhar Dzongkhag',
    lat:26.8000, lng:91.5100, color:'#ff7043',
    tags:['Southern Gateway','Assam Border','Ecological Gradient'],
    desc:'Bhutan\'s southeastern gateway to the Brahmaputra plains. Within a single dzongkhag, elevation rises from subtropical lowlands to high alpine ridges — among the world\'s steepest ecological gradients. The foothills harbor rare Bengal tigers and one-horned rhinoceroses.',
    link:'samdrup_jongkhar.html'
  },
  {
    name:'Zhemgang', dzongkhag:'Zhemgang Dzongkhag',
    lat:27.2100, lng:90.6600, color:'#66bb6a',
    tags:['Kheng Oral Traditions','Royal Manas Park','Shamanic Rites'],
    desc:'Kheng country at its most traditional — oral poetry, shamanic boepa ritual, and festival dances remain largely unchanged for centuries. The Royal Manas National Park, Bhutan\'s oldest wildlife reserve, occupies the subtropical southern fringe of this district.',
    link:'zhemgang.html'
  },
  {
    name:'Sarpang', dzongkhag:'Sarpang Dzongkhag',
    lat:26.8600, lng:90.2700, color:'#ef5350',
    tags:['Manas Wildlife Corridor','Gelephu Gateway','Foothills'],
    desc:'Sarpang borders the UNESCO-listed Manas Tiger Reserve and shares the vast Brahmaputra wildlife corridor with Assam. The Gelephu gateway opens onto the new Special Administrative Region, envisioned as a mindfulness-based sustainable city at the Himalayan foot.',
    link:'sarpang.html'
  },
  {
    name:'Dagana', dzongkhag:'Dagana Dzongkhag',
    lat:27.0700, lng:89.8800, color:'#ab47bc',
    tags:['Ridge-top Dzong','Sowa Rigpa Medicine','Subtropical Forest'],
    desc:'Dagana Dzong crowns a narrow forested ridge — one of Bhutan\'s most dramatic and least-visited fortresses. The district straddles subtropical and temperate zones rich in the medicinal plants foundational to Sowa Rigpa, Bhutan\'s traditional Tibetan medicine system.',
    link:'dagana.html'
  },
  {
    name:'Tsirang', dzongkhag:'Tsirang Dzongkhag',
    lat:27.0200, lng:89.9800, color:'#78909c',
    tags:['Orchard District','Mandarin Gardens','Lhotshampa Heritage'],
    desc:'Tsirang\'s hillsides are terraced with mandarin, cardamom, and areca orchards. The Damphu cultural gatherings preserve the music, dances, and songs of Lhotshampa communities whose ancestors migrated from the Himalayan foothills of Nepal generations ago.',
    link:'tsirang.html'
  },
  {
    name:'Chukha', dzongkhag:'Chukha Dzongkhag',
    lat:27.0550, lng:89.4700, color:'#42a5f5',
    tags:['Phuentsholing','Ancient Trade Route','Hydropower'],
    desc:'Home to Phuentsholing, Bhutan\'s commercial gateway to India. The ancient Chukha gorge route through the Phuntsho Chhu connected highland Bhutan to the Duars trade plains for centuries. The Chukha hydropower dam — Bhutan\'s first — transformed the national economy.',
    link:'chukha.html'
  }
];

function initMap() {

const tileLayers = {
  google:    L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', { attribution:'© Google Maps', maxZoom:20 }),
  satellite: L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', { attribution:'© Google Maps', maxZoom:20 }),
  topo:      L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',    { attribution:'© OpenTopoMap', maxZoom:17 }),
  osm:       L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',  { attribution:'© OpenStreetMap', maxZoom:19 })
};
let currentLayerKey = 'google';

const map = L.map('map', {
  center: [27.45, 90.5], zoom: 9,
  layers: [tileLayers.google],
  zoomControl: false,
  zoomDelta: 0.5,
  zoomSnap: 0.5,
  maxBounds: [[24,84],[32,97]], minZoom: 8, maxZoom: 12
});
L.control.zoom({ position:'bottomright' }).addTo(map);
L.control.scale({ position:'bottomright', imperial:false }).addTo(map);

function makePinIcon(color) {
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="32" viewBox="0 0 28 36">
    <path d="M14 0C6.27 0 0 6.27 0 14c0 10.5 14 22 14 22S28 24.5 28 14C28 6.27 21.73 0 14 0z" fill="${color}" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
    <circle cx="14" cy="14" r="5.5" fill="rgba(255,255,255,0.88)"/></svg>`;
  return L.divIcon({ html:svg, className:'', iconSize:[24,32], iconAnchor:[12,32], popupAnchor:[0,-34] });
}

const markers = {};

dzongkhags.forEach(d => {
  const tagsHtml = d.tags.map(t => `<span class="pu-tag">${t}</span>`).join('');
  const popupHtml = `
    <div class="pu-header" style="background:${d.color}">
      <div class="pu-sub">${d.dzongkhag}</div>
      <h3>${d.name}</h3>
    </div>
    <div class="pu-body">
      <div class="pu-tags">${tagsHtml}</div>
      <p class="pu-desc">${d.desc}</p>
      <a class="pu-link" href="${d.link}" target="_blank">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
          <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
        Explore ${d.name}
      </a>
    </div>`;

  const marker = L.marker([d.lat, d.lng], { icon: makePinIcon(d.color) })
    .addTo(map)
    .bindPopup(popupHtml, {
      maxWidth: 280,
      autoClose: false,
      closeOnClick: false,
      closeButton: false
    });

  markers[d.name] = marker;

  let closeTimer = null;

  // Helper: cancel any pending close
  const cancelClose = () => { if (closeTimer) { clearTimeout(closeTimer); closeTimer = null; } };

  // Schedule close with small delay so cursor can move into popup
  const scheduleClose = () => {
    closeTimer = setTimeout(() => { marker.closePopup(); }, 120);
  };

  // Open on marker hover
  marker.on('mouseover', () => {
    cancelClose();
    // Close any other open popup first
    Object.values(markers).forEach(m => { if (m !== marker) m.closePopup(); });
    marker.openPopup();
  });

  // Schedule close when cursor leaves marker
  marker.on('mouseout', () => {
    scheduleClose();
  });

  // When popup is added to DOM, attach mouse listeners to the popup element
  marker.on('popupopen', () => {
    const popupEl = marker.getPopup().getElement();
    if (!popupEl) return;
    popupEl.addEventListener('mouseenter', cancelClose);
    popupEl.addEventListener('mouseleave', scheduleClose);
  });
});

/* Side panel list + collapsed dots */
const dzongList = document.getElementById('dzong-list');
const collapsedHint = document.getElementById('collapsed-hint');
let activeChip = null;

dzongkhags.forEach(d => {
  const dot = document.createElement('div');
  dot.className = 'hint-dot';
  dot.style.background = d.color;
  collapsedHint.appendChild(dot);

  const chip = document.createElement('div');
  chip.className = 'dzong-chip';
  chip.innerHTML = `<div class="dot" style="background:${d.color}"></div><span>${d.name}</span>`;
  chip.onclick = () => {
    if (activeChip) activeChip.classList.remove('active');
    chip.classList.add('active');
    activeChip = chip;
    map.setView([d.lat, d.lng], 12, { animate:true });
    setTimeout(() => markers[d.name].openPopup(), 480);
  };
  dzongList.appendChild(chip);
});

/* Search */
document.getElementById('search-box').addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const q = e.target.value.trim().toLowerCase();
  const d = dzongkhags.find(x => x.name.toLowerCase().includes(q));
  if (d) { map.setView([d.lat, d.lng], 12, {animate:true}); setTimeout(()=>markers[d.name].openPopup(),480); }
});

/* Layer switch */
function switchLayer(key) {
  map.removeLayer(tileLayers[currentLayerKey]);
  map.addLayer(tileLayers[key]);
  currentLayerKey = key;
  document.querySelectorAll('.layer-option').forEach(el => el.classList.toggle('active', el.dataset.id===key));
  document.getElementById('layer-menu').classList.remove('open');
}
window.switchLayer = switchLayer;

/* Bhutan boundary mask */
const FALLBACK = [
  [89.535,26.720],[89.610,26.718],[89.745,26.697],[89.900,26.718],
  [89.980,26.745],[90.150,26.780],[90.370,26.877],[90.510,26.920],
  [90.735,26.990],[91.000,26.855],[91.290,26.803],[91.450,26.812],
  [91.635,26.812],[91.800,26.940],[91.990,27.065],[92.050,27.210],
  [92.123,27.290],[92.080,27.490],[92.055,27.630],
  [91.960,27.800],[91.840,27.940],[91.700,28.040],[91.550,28.060],
  [91.380,28.050],[91.200,27.970],[91.020,28.050],[90.740,28.250],
  [90.560,28.260],[90.360,28.230],[90.100,28.160],[89.860,28.050],
  [89.700,27.990],[89.440,27.800],
  [89.300,27.720],[89.035,27.500],[88.990,27.400],
  [88.940,27.290],[88.760,27.310],[88.760,27.180],[88.749,27.080],
  [88.760,26.980],[88.870,26.945],[89.000,26.950],[89.130,26.880],
  [89.250,26.845],[89.400,26.785],[89.535,26.720]
];

function applyMask(coords) {
  const world=[[-180,-90],[180,-90],[180,90],[-180,90],[-180,-90]];
  L.geoJSON({type:'Feature',geometry:{type:'Polygon',coordinates:[world,coords]}},{
    style:{fillColor:'#ffffff',fillOpacity:0.9,color:'transparent',weight:0},interactive:false
  }).addTo(map);
  L.geoJSON({type:'Feature',geometry:{type:'Polygon',coordinates:[coords]}},{
    style:{fillColor:'transparent',fillOpacity:0,color:'#e8a020',weight:2.5,opacity:.88},interactive:false
  }).addTo(map);
}

async function loadMask() {
  try {
    const res = await fetch('https://raw.githubusercontent.com/georgique/world-geojson/develop/countries/bhutan.json');
    if (!res.ok) throw new Error();
    const data = await res.json();
    const geom = data.geometry || data.features?.[0]?.geometry;
    if (!geom) throw new Error();
    let rings=[];
    if(geom.type==='Polygon') rings=geom.coordinates;
    else if(geom.type==='MultiPolygon') geom.coordinates.forEach(p=>rings.push(...p));
    const clipped=rings.map(r=>r.map(([lng,lat])=>[lng,Math.min(lat,28.38)]));
    const world=[[-180,-90],[180,-90],[180,90],[-180,90],[-180,-90]];
    L.geoJSON({type:'Feature',geometry:{type:'Polygon',coordinates:[world,...clipped]}},{
      style:{fillColor:'#ffffff',fillOpacity:0.9,color:'transparent',weight:0},interactive:false
    }).addTo(map);
    clipped.forEach(r=>{
      L.geoJSON({type:'Feature',geometry:{type:'Polygon',coordinates:[r]}},{
        style:{fillColor:'transparent',fillOpacity:0,color:'#e8a020',weight:2.5,opacity:.85},interactive:false
      }).addTo(map);
    });
  } catch(e) { applyMask(FALLBACK); }
  document.getElementById('loading').style.display='none';
}

loadMask();
} // end initMap

window.togglePanel = () => document.getElementById('side-panel').classList.toggle('open');
window.toggleLayerMenu = () => document.getElementById('layer-menu').classList.toggle('open');
document.addEventListener('click', e=>{
  if(!e.target.closest('#layer-btn')&&!e.target.closest('#layer-menu'))
    document.getElementById('layer-menu').classList.remove('open');
});

loadScript('https://unpkg.com/leaflet@1.9.4/dist/leaflet.js', initMap);
